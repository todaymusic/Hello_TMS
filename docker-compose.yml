# TMS 로컬 인프라 — Docker Desktop 설치 후 `docker compose up -d`
services:
  postgres:
    image: postgres:16
    container_name: tms-postgres
    environment:
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms
      POSTGRES_DB: tms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tms-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: tms-meili
    environment:
      MEILI_MASTER_KEY: tms_dev_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
